name: Deploy to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    permissions:
      contents: read
      actions: none
      checks: none
      deployments: none
      issues: none
      packages: none
      pull-requests: none
      repository-projects: none
      security-events: none
      statuses: none

    steps:
      - name: Pull latest code from main
        run: |
          cd /var/www/SmartVillage_V1/my-app
          git reset --hard
          git pull origin main

      - name: Install dependencies
        run: |
          cd /var/www/SmartVillage_V1/my-app
          npm install --legacy-peer-deps

      - name: Type check
        continue-on-error: true
        run: |
          cd /var/www/SmartVillage_V1/my-app
          npm run type-check

      - name: Restart PM2
        run: |
          pm2 restart svr
